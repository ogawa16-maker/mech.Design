<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QRコード一覧 - Mech. Design Thinking PJ 2025-2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--navy:#1c2b4a;--gold:#c8a84b;--cream:#f4efe4;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0e1625;font-family:'Noto Sans JP',sans-serif;padding:20px;}
.page-header{text-align:center;margin-bottom:32px;}
.page-title{font-family:'Playfair Display',serif;color:var(--gold);font-size:22px;letter-spacing:2px;}
.page-sub{color:rgba(200,168,75,.5);font-size:11px;letter-spacing:3px;margin-top:6px;}
.gold-rule{height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:14px auto;max-width:300px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:20px;max-width:1000px;margin:0 auto;}
.card{background:var(--cream);border-radius:12px;overflow:hidden;position:relative;}
.card::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 19px,rgba(160,140,100,.07) 20px);pointer-events:none;}
.card-header{background:var(--navy);padding:12px 16px;display:flex;align-items:center;gap:10px;}
.stamp-preview{width:36px;height:36px;border-radius:6px;overflow:hidden;flex-shrink:0;}
.stamp-preview canvas{width:36px!important;height:36px!important;}
.member-info{}
.member-label{font-size:8px;letter-spacing:2px;color:rgba(200,168,75,.5);}
.member-name{font-family:'Playfair Display',serif;color:var(--gold);font-size:16px;}
.card-body{padding:16px;display:flex;flex-direction:column;align-items:center;}
.qr-wrap{background:white;padding:12px;border-radius:8px;border:1px solid rgba(28,43,74,.1);margin-bottom:10px;}
.card-footer{font-size:9px;color:rgba(28,43,74,.35);letter-spacing:1px;text-align:center;}

@media print{
  body{background:white;padding:10px;}
  .page-header{margin-bottom:16px;}
  .page-title{color:#1c2b4a;}
  .page-sub{color:#888;}
  .card{break-inside:avoid;border:1px solid #ccc;}
  .card-header{background:#1c2b4a;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
  .gold-rule{background:#c8a84b;-webkit-print-color-adjust:exact;print-color-adjust:exact;}
}
</style>
</head>
<body>

<div class="page-header">
  <div class="page-title">Mech. Design Thinking PJ</div>
  <div class="page-sub">STAMP PASSPORT · 2025–2026 · MEMBER QR CODES</div>
  <div class="gold-rule"></div>
</div>

<div class="grid" id="grid"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
const MEMBERS = [
  { name:"大谷",  color:"#4A90D9", symbol:"◆", bg:"#E8F4FD" },
  { name:"吉村",  color:"#E8734A", symbol:"●", bg:"#FDF0EB" },
  { name:"藤森",  color:"#5BAD6F", symbol:"▲", bg:"#EDF7EF" },
  { name:"角谷",  color:"#D4A843", symbol:"★", bg:"#FBF6E8" },
  { name:"赤松",  color:"#C0546A", symbol:"♦", bg:"#FAECEF" },
  { name:"岡崎",  color:"#7B68C8", symbol:"■", bg:"#F0EEF9" },
  { name:"立花",  color:"#3AADA8", symbol:"✦", bg:"#E8F7F6" },
  { name:"諸星",  color:"#D4773A", symbol:"⬟", bg:"#FBF0E8" },
  { name:"滝沢",  color:"#5A9E6F", symbol:"◉", bg:"#EDF7F0" },
  { name:"小林",  color:"#9B6BB5", symbol:"✿", bg:"#F5EEF9" },
];

const grid = document.getElementById('grid');

MEMBERS.forEach((m, i) => {
  const card = document.createElement('div');
  card.className = 'card';

  // スタンプ画像をCanvasで生成
  const stampCanvas = document.createElement('canvas');
  stampCanvas.width = 80;
  stampCanvas.height = 80;
  const ctx = stampCanvas.getContext('2d');

  // 背景
  ctx.fillStyle = m.bg;
  ctx.beginPath();
  ctx.roundRect(0, 0, 80, 80, 8);
  ctx.fill();

  // 外枠の円
  ctx.strokeStyle = m.color;
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(40, 40, 34, 0, Math.PI * 2);
  ctx.stroke();

  // 内側の円（点線風）
  ctx.strokeStyle = m.color;
  ctx.lineWidth = 1;
  ctx.setLineDash([3, 3]);
  ctx.beginPath();
  ctx.arc(40, 40, 28, 0, Math.PI * 2);
  ctx.stroke();
  ctx.setLineDash([]);

  // シンボル
  ctx.fillStyle = m.color;
  ctx.font = 'bold 28px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(m.symbol, 40, 38);

  // 名前
  ctx.font = '10px sans-serif';
  ctx.fillStyle = m.color;
  ctx.fillText(m.name, 40, 62);

  card.innerHTML = `
    <div class="card-header">
      <div class="stamp-preview" id="stamp-${i}"></div>
      <div class="member-info">
        <div class="member-label">MEMBER · ${String(i+1).padStart(2,'0')}</div>
        <div class="member-name">${m.name}</div>
      </div>
    </div>
    <div class="card-body">
      <div class="qr-wrap" id="qr-${i}"></div>
      <div class="card-footer">mdtpj:${m.name} · Mech. Design Thinking PJ 2025-2026</div>
    </div>
  `;

  grid.appendChild(card);

  // QRコード生成
  new QRCode(document.getElementById('qr-'+i), {
    text: 'mdtpj:' + m.name,
    width: 160,
    height: 160,
    colorDark: '#1c2b4a',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.H
  });

  // スタンププレビュー
  const previewDiv = document.getElementById('stamp-'+i);
  stampCanvas.style.borderRadius = '6px';
  previewDiv.appendChild(stampCanvas);
});
</script>
</body>
</html>
